<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Impact Coaching — Client Portal</title>
<style>
:root {
  --bg:#0e0e0e; --bg2:#161616; --bg3:#1e1e1e; --bg4:#242424;
  --bd:#2a2a2a; --bd2:#333;
  --t:#f0f0f0; --t2:#ccc; --t3:#888; --t4:#555;
  --red:#e83a3a; --green:#3ae87a; --blue:#3a8be8;
  --orange:#e8923a; --yellow:#e8c03a; --teal:#3ae8c8;
  --grad: linear-gradient(135deg,#e83a3a,#e8923a);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;padding:0;}

/* ── HEADER ─────────────────────────────────────── */
.hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;
  background:var(--bg2);border-bottom:1.5px solid var(--bd);position:sticky;top:0;z-index:100;}
.hdr-logo{width:36px;height:36px;border-radius:6px;object-fit:contain;}
.hdr-info{flex:1;}
.hdr-brand{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.15em;font-family:monospace;}
.hdr-name{font-size:17px;font-weight:800;}

/* ── PIN SCREEN ──────────────────────────────────── */
#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:32px 24px;text-align:center;}
.pin-logo{width:100px;height:100px;border-radius:16px;object-fit:contain;
  margin-bottom:20px;box-shadow:0 8px 32px rgba(232,58,58,.3);}
.pin-brand{font-size:24px;font-weight:800;background:var(--grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.pin-sub{font-size:13px;color:var(--t3);margin-bottom:32px;font-family:monospace;}
.pin-label{font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;
  font-family:monospace;margin-bottom:10px;}
.pin-inputs{display:flex;gap:10px;margin-bottom:24px;}
.pin-digit{width:52px;height:64px;background:var(--bg2);border:2px solid var(--bd2);
  border-radius:12px;font-size:28px;font-weight:800;text-align:center;color:var(--t);
  font-family:monospace;outline:none;caret-color:transparent;}
.pin-digit:focus{border-color:var(--red);}
.pin-btn{background:var(--grad);border:none;color:#fff;font-weight:800;font-size:16px;
  padding:16px 48px;border-radius:12px;cursor:pointer;font-family:inherit;width:100%;max-width:280px;}
.pin-error{color:var(--red);font-size:13px;margin-top:12px;font-family:monospace;min-height:20px;}

/* ── MAIN CONTENT ────────────────────────────────── */
#main-content{display:none;padding:16px;}

.page-section{background:var(--bg2);border:1.5px solid var(--bd);border-radius:14px;
  padding:16px;margin-bottom:14px;}
.sec-title{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;
  font-family:monospace;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd);}
.client-hero{display:flex;align-items:center;gap:14px;margin-bottom:4px;}
.client-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0;}
.client-name{font-size:22px;font-weight:800;}
.client-type{font-size:13px;color:var(--t3);margin-top:2px;}

/* ── EXERCISE LOOKUP ─────────────────────────────── */
.lookup-result-item{padding:12px 0;border-bottom:1px solid var(--bd);}
.lookup-result-item:last-child{border-bottom:none;}
.lr-date{font-size:11px;color:var(--t4);font-family:monospace;}
.lr-weight{font-size:16px;font-weight:700;color:var(--green);}
.lr-scheme{font-size:12px;color:var(--t3);}

/* ── BODY STATS ─────────────────────────────────── */
.stat-entry{display:flex;align-items:flex-start;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--bd);}
.stat-entry:last-child{border-bottom:none;}
.stat-date{font-size:11px;color:var(--t4);font-family:monospace;margin-bottom:2px;}
.stat-notes{font-size:14px;color:var(--t2);}

/* ── SESSIONS ────────────────────────────────────── */
.sess-assigned{background:var(--bg3);border:1.5px solid var(--bd2);border-radius:10px;
  overflow:hidden;margin-bottom:10px;}
.sess-assigned-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;cursor:pointer;}
.sess-assigned-body{display:none;padding:14px;border-top:1px solid var(--bd);}
.sess-assigned-body.open{display:block;}
.ex-row-client{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--bd);}
.ex-row-client:last-child{border-bottom:none;}
.ex-name-c{font-size:14px;font-weight:600;}
.ex-scheme-c{font-size:12px;color:var(--t3);}
.actual-inp{background:var(--bg2);border:1.5px solid var(--bd2);color:var(--t);
  border-radius:8px;padding:8px 10px;font-family:monospace;font-size:14px;
  text-align:center;width:90px;outline:none;}
.actual-inp:focus{border-color:var(--blue);}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;
  text-transform:uppercase;letter-spacing:.06em;}
.badge-done{background:#0a2a15;color:var(--green);border:1px solid var(--green)33;}
.badge-planned{background:#1a1a00;color:var(--yellow);border:1px solid var(--yellow)33;}

/* ── INPUTS ──────────────────────────────────────── */
.inp{width:100%;background:var(--bg3);border:1.5px solid var(--bd2);color:var(--t);
  border-radius:8px;padding:10px 12px;font-family:inherit;font-size:15px;
  outline:none;margin-top:4px;}
.inp:focus{border-color:var(--blue);}
.lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;
  font-family:monospace;display:block;margin-bottom:4px;}
.field{margin-bottom:12px;}
.btn{display:block;width:100%;background:var(--grad);border:none;color:#fff;
  font-weight:800;font-size:15px;padding:14px;border-radius:10px;cursor:pointer;
  font-family:inherit;margin-top:8px;}
.btn-sec{background:var(--bg3);border:1.5px solid var(--bd2);color:var(--t2);
  font-weight:600;font-size:14px;padding:12px;border-radius:10px;cursor:pointer;
  font-family:inherit;width:100%;margin-top:8px;}

/* ── TOAST ───────────────────────────────────────── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#1a1a1a;border:1.5px solid #333;color:#fff;padding:10px 20px;
  border-radius:20px;font-size:14px;pointer-events:none;opacity:0;
  transition:opacity .2s;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<!-- HEADER (hidden until logged in) -->
<div class="hdr" id="main-hdr" style="display:none;">
  <img id="hdr-logo" class="hdr-logo" src="" alt="IC">
  <div class="hdr-info">
    <div class="hdr-brand">Impact Coaching</div>
    <div class="hdr-name" id="hdr-client-name">Client Portal</div>
  </div>
</div>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <img id="pin-logo" class="pin-logo" src="" alt="Impact Coaching">
  <div class="pin-brand">Impact Coaching</div>
  <div class="pin-sub">Client Portal</div>
  <div class="pin-label">Enter your PIN</div>
  <div class="pin-inputs">
    <input class="pin-digit" id="p0" maxlength="1" type="tel" inputmode="numeric">
    <input class="pin-digit" id="p1" maxlength="1" type="tel" inputmode="numeric">
    <input class="pin-digit" id="p2" maxlength="1" type="tel" inputmode="numeric">
    <input class="pin-digit" id="p3" maxlength="1" type="tel" inputmode="numeric">
    <input class="pin-digit" id="p4" maxlength="1" type="tel" inputmode="numeric">
  </div>
  <button class="pin-btn" onclick="submitPin()">Enter</button>
  <div class="pin-error" id="pin-error"></div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content">

  <!-- Client hero -->
  <div class="page-section" id="client-hero-section">
    <div class="client-hero">
      <div class="client-av" id="client-av"></div>
      <div>
        <div class="client-name" id="client-name-el"></div>
        <div class="client-type" id="client-type-el"></div>
      </div>
    </div>
  </div>

  <!-- Assigned Sessions -->
  <div class="page-section">
    <div class="sec-title">&#128203; Assigned Sessions</div>
    <div id="assigned-sessions-list">
      <div style="color:var(--t4);font-size:13px;padding:8px 0;">No sessions assigned yet</div>
    </div>
  </div>

  <!-- Exercise Lookup -->
  <div class="page-section">
    <div class="sec-title">&#128269; Exercise Lookup</div>
    <div class="field">
      <input class="inp" id="ex-search" type="search" placeholder="Search exercise name..." oninput="doExLookup()">
    </div>
    <div id="ex-lookup-results" style="color:var(--t4);font-size:13px;padding:4px 0;">
      Type an exercise to see your history
    </div>
  </div>

  <!-- Body Stats -->
  <div class="page-section">
    <div class="sec-title">&#128200; Body Stats &amp; Notes</div>
    <div class="field">
      <span class="lbl">Date</span>
      <input class="inp" id="new-stat-date" type="date">
    </div>
    <div class="field">
      <span class="lbl">Notes / Measurements</span>
      <textarea class="inp" id="new-stat-notes" rows="2" placeholder="e.g. Weight: 72kg, feeling stronger..."></textarea>
    </div>
    <button class="btn" onclick="addStatEntry()">+ Add Entry</button>
    <div id="stats-list" style="margin-top:14px;"></div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────────
var SCRIPT_URL = '';  // filled from DB on load via index.html's stored settings
var clientId   = '';
var clientData = null; // the full client object
var allSessions = [];  // this client's sessions

// ── INIT ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  // Get clientId from URL
  var params = new URLSearchParams(window.location.search);
  clientId = params.get('id') || '';
  if (!clientId) {
    document.getElementById('pin-error').textContent = 'Invalid link — no client ID found.';
    return;
  }

  // Wire PIN inputs — auto-advance on digit entry
  for (var i = 0; i < 5; i++) {
    (function(idx) {
      var el = document.getElementById('p' + idx);
      el.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '').slice(-1);
        if (this.value && idx < 4) document.getElementById('p' + (idx+1)).focus();
        if (idx === 4 && this.value) submitPin();
      });
      el.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !this.value && idx > 0) {
          document.getElementById('p' + (idx-1)).focus();
        }
      });
    })(i);
  }
  document.getElementById('p0').focus();

  // Try to load the script URL from localStorage (it's already stored by the main app)
  try {
    var sk  = 'impact-coaching-v2';
    var raw = localStorage.getItem(sk);
    if (raw) {
      var db = JSON.parse(raw);
      SCRIPT_URL = (db.settings && db.settings.scriptUrl) || '';
    }
  } catch(e) {}
});

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

function initials(name) {
  return (name||'').split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);
}

// ── PIN SUBMIT ────────────────────────────────────────────────────────
function submitPin() {
  var pin = '';
  for (var i = 0; i < 5; i++) {
    pin += document.getElementById('p' + i).value;
  }
  if (pin.length < 5) {
    document.getElementById('pin-error').textContent = 'Please enter all 5 digits.';
    return;
  }
  document.getElementById('pin-error').textContent = '';

  if (!SCRIPT_URL) {
    // No script URL - try to verify PIN locally from localStorage (same device as PT)
    verifyPinLocal(pin);
  } else {
    verifyPinFromDrive(pin);
  }
}

function verifyPinLocal(pin) {
  try {
    var raw = localStorage.getItem('impact-coaching-v2');
    if (!raw) { showPinError('Could not load data. Please try from the PT link.'); return; }
    var db = JSON.parse(raw);
    var client = (db.clients || []).find(function(c) { return c.id === clientId; });
    if (!client) { showPinError('Client not found.'); return; }
    if (String(client.pin) !== String(pin)) { showPinError('Incorrect PIN. Try again.'); return; }
    loadClientData(db, client);
  } catch(e) {
    showPinError('Error loading data.');
  }
}

function verifyPinFromDrive(pin) {
  document.getElementById('pin-error').textContent = 'Checking...';
  fetch(SCRIPT_URL)
    .then(function(r) { return r.json(); })
    .then(function(db) {
      var client = (db.clients || []).find(function(c) { return c.id === clientId; });
      if (!client) { showPinError('Client not found.'); return; }
      if (String(client.pin) !== String(pin)) { showPinError('Incorrect PIN. Try again.'); return; }
      loadClientData(db, client);
    })
    .catch(function() { showPinError('Could not connect. Check your connection.'); });
}

function showPinError(msg) {
  document.getElementById('pin-error').textContent = msg;
  // Shake animation
  var inputs = document.querySelector('.pin-inputs');
  inputs.style.animation = 'shake .3s';
  setTimeout(function() { inputs.style.animation = ''; }, 300);
  // Clear PIN
  for (var i = 0; i < 5; i++) document.getElementById('p' + i).value = '';
  document.getElementById('p0').focus();
}

// ── LOAD CLIENT DATA ──────────────────────────────────────────────────
function loadClientData(db, client) {
  clientData = client;
  allSessions = (db.sessions || []).filter(function(s) {
    return s.clientId === clientId || s.clientId2 === clientId;
  }).sort(function(a,b) { return (b.date||'').localeCompare(a.date||''); });

  // Show main content
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('main-hdr').style.display = 'flex';
  document.getElementById('main-content').style.display = 'block';

  // Set header
  document.getElementById('hdr-client-name').textContent = client.name;

  // Render hero
  var av = document.getElementById('client-av');
  av.textContent = initials(client.name);
  av.style.background = client.color || '#e83a3a';

  document.getElementById('client-name-el').textContent = client.name;
  document.getElementById('client-type-el').textContent = client.ptType || 'Impact Coaching Client';

  // Set today's date on stat form
  var today = new Date().toISOString().slice(0,10);
  document.getElementById('new-stat-date').value = today;

  // Render sections
  renderAssignedSessions();
  renderStatsLog();
}

// ── ASSIGNED SESSIONS ─────────────────────────────────────────────────
function renderAssignedSessions() {
  var el = document.getElementById('assigned-sessions-list');
  var assigned = allSessions.filter(function(s) { return s.assignedToClient; });

  if (!assigned.length) {
    el.innerHTML = '<div style="color:var(--t4);font-size:13px;padding:8px 0;">No sessions assigned yet</div>';
    return;
  }

  var html = '';
  assigned.forEach(function(s) {
    var isDone = s.status === 'completed';
    var badge  = isDone
      ? '<span class="badge badge-done">&#10003; Done</span>'
      : '<span class="badge badge-planned">Planned</span>';

    html += '<div class="sess-assigned">';
    html += '<div class="sess-assigned-hdr" onclick="toggleSessBody(\'' + s.id + '\')">';
    html += '<div>';
    html += '<div style="font-size:15px;font-weight:700;">' + (s.name || 'Session') + '</div>';
    html += '<div style="font-size:11px;color:var(--t3);font-family:monospace;margin-top:2px;">' + s.date + '</div>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;gap:8px;">' + badge + '<span style="color:var(--t4);">&#8250;</span></div>';
    html += '</div>';

    html += '<div class="sess-assigned-body" id="sb-' + s.id + '">';
    (s.rows || []).forEach(function(r) {
      html += '<div class="ex-row-client">';
      html += '<div><div class="ex-name-c">' + r.exerciseName + '</div>';
      html += '<div class="ex-scheme-c">' + (r.scheme||'') + (r.target ? ' · Target: '+r.target+'kg' : '') + '</div></div>';
      if (!isDone) {
        html += '<input class="actual-inp" id="act-'+r.id+'" type="number" placeholder="kg" value="' + (r.actual||'') + '" min="0" step="0.5">';
      } else {
        html += '<div style="font-size:14px;font-weight:700;color:var(--green);">' + (r.actual || '—') + (r.actual ? 'kg' : '') + '</div>';
      }
      html += '</div>';
    });

    if (s.notes) {
      html += '<div style="margin-top:10px;padding:10px;background:var(--bg2);border-radius:8px;font-size:12px;color:var(--t3);">📝 ' + s.notes + '</div>';
    }

    if (!isDone) {
      html += '<div style="margin-top:10px;">';
      html += '<span class="lbl">How did it go?</span>';
      html += '<textarea class="inp" id="cn-'+s.id+'" rows="2" placeholder="Any notes for your PT..."></textarea>';
      html += '</div>';
      html += '<button class="btn" onclick="completeSession(\'' + s.id + '\')">&#10003; Mark Complete</button>';
    }

    html += '</div></div>';
  });

  el.innerHTML = html;
}

function toggleSessBody(id) {
  var el = document.getElementById('sb-' + id);
  if (el) el.classList.toggle('open');
}

function completeSession(sessId) {
  var s = allSessions.find(function(x) { return x.id === sessId; });
  if (!s) return;

  // Collect actuals
  (s.rows || []).forEach(function(r) {
    var inp = document.getElementById('act-' + r.id);
    if (inp) r.actual = inp.value.trim();
  });
  var cnEl = document.getElementById('cn-' + sessId);
  s.clientNotes = cnEl ? cnEl.value.trim() : '';
  s.status = 'completed';
  s.completedAt = new Date().toISOString();

  // Push back to Drive if script URL available
  if (SCRIPT_URL) {
    pushSessionUpdate(s);
  } else {
    // Update localStorage directly (same device as PT)
    try {
      var raw = localStorage.getItem('impact-coaching-v2');
      if (raw) {
        var db = JSON.parse(raw);
        var idx = db.sessions.findIndex(function(x) { return x.id === sessId; });
        if (idx > -1) db.sessions[idx] = s;
        localStorage.setItem('impact-coaching-v2', JSON.stringify(db));
        toast('Session completed ✓ — synced locally');
      }
    } catch(e) { toast('Saved locally ✓'); }
  }

  renderAssignedSessions();
  toast('Session completed ✓ — well done! 💪');
}

function pushSessionUpdate(session) {
  if (!SCRIPT_URL) return;
  // Fetch current DB, update session, push back
  fetch(SCRIPT_URL)
    .then(function(r) { return r.json(); })
    .then(function(db) {
      var idx = db.sessions.findIndex(function(x) { return x.id === session.id; });
      if (idx > -1) db.sessions[idx] = session;
      return fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(db),
        headers: { 'Content-Type': 'text/plain' }
      });
    })
    .then(function() { toast('Synced to your PT ✓'); })
    .catch(function() { toast('Saved — will sync next time'); });
}

// ── EXERCISE LOOKUP ───────────────────────────────────────────────────
function doExLookup() {
  var q = (document.getElementById('ex-search').value || '').trim().toLowerCase();
  var el = document.getElementById('ex-lookup-results');

  if (!q) {
    el.innerHTML = '<div style="color:var(--t4);font-size:13px;">Type an exercise to see your history</div>';
    return;
  }

  var results = [];
  allSessions.forEach(function(s) {
    if (s.status !== 'completed') return;
    (s.rows || []).forEach(function(r) {
      if (!r.exerciseName) return;
      if (r.exerciseName.toLowerCase().indexOf(q) === -1) return;
      if (r.actual || r.target) {
        results.push({
          date: s.date,
          exercise: r.exerciseName,
          scheme: r.scheme || '',
          target: r.target || '',
          actual: r.actual || ''
        });
      }
    });
  });

  results.sort(function(a,b) { return b.date.localeCompare(a.date); });

  if (!results.length) {
    el.innerHTML = '<div style="color:var(--t4);font-size:13px;padding:8px 0;">No history found for "' + q + '"</div>';
    return;
  }

  var html = '';
  results.forEach(function(r) {
    html += '<div class="lookup-result-item">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;">';
    html += '<div>';
    html += '<div style="font-size:14px;font-weight:600;">' + r.exercise + '</div>';
    html += '<div class="lr-date">' + r.date + (r.scheme ? ' · ' + r.scheme : '') + '</div>';
    html += '</div>';
    html += '<div style="text-align:right;">';
    if (r.actual) html += '<div class="lr-weight">' + r.actual + 'kg</div>';
    if (r.target) html += '<div style="font-size:11px;color:var(--t3);">Target: ' + r.target + 'kg</div>';
    html += '</div></div></div>';
  });
  el.innerHTML = html;
}

// ── BODY STATS ────────────────────────────────────────────────────────
function renderStatsLog() {
  var el = document.getElementById('stats-list');
  var log = (clientData && clientData.statsLog) || [];
  if (!log.length) {
    el.innerHTML = '<div style="color:var(--t4);font-size:13px;padding:8px 0;">No entries yet</div>';
    return;
  }
  var sorted = log.slice().sort(function(a,b) { return b.date.localeCompare(a.date); });
  var html = '';
  sorted.forEach(function(entry) {
    html += '<div class="stat-entry">';
    html += '<div><div class="stat-date">' + entry.date + '</div>';
    html += '<div class="stat-notes">' + entry.notes + '</div></div>';
    html += '</div>';
  });
  el.innerHTML = html;
}

function addStatEntry() {
  var date  = document.getElementById('new-stat-date').value;
  var notes = document.getElementById('new-stat-notes').value.trim();
  if (!date || !notes) { toast('Enter a date and notes'); return; }

  var entry = { id: Date.now().toString(36), date: date, notes: notes };

  if (!clientData.statsLog) clientData.statsLog = [];
  clientData.statsLog.push(entry);
  clientData.updatedAt = new Date().toISOString();

  document.getElementById('new-stat-notes').value = '';

  if (SCRIPT_URL) {
    pushStatUpdate();
  } else {
    // Update localStorage directly
    try {
      var raw = localStorage.getItem('impact-coaching-v2');
      if (raw) {
        var db = JSON.parse(raw);
        var ci = db.clients.findIndex(function(c) { return c.id === clientId; });
        if (ci > -1) db.clients[ci] = clientData;
        localStorage.setItem('impact-coaching-v2', JSON.stringify(db));
      }
    } catch(e) {}
  }

  renderStatsLog();
  toast('Entry added ✓');
}

function pushStatUpdate() {
  fetch(SCRIPT_URL)
    .then(function(r) { return r.json(); })
    .then(function(db) {
      var ci = db.clients.findIndex(function(c) { return c.id === clientId; });
      if (ci > -1) db.clients[ci] = clientData;
      return fetch(SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(db),
        headers: { 'Content-Type': 'text/plain' }
      });
    })
    .then(function() { toast('Synced ✓'); })
    .catch(function() { toast('Saved locally ✓'); });
}
</script>

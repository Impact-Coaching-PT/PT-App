<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Impact Coaching — Client Portal</title>
<style>
:root {
  --bg:#0e0e0e; --bg2:#161616; --bg3:#1e1e1e; --bg4:#242424;
  --bd:#2a2a2a; --bd2:#333;
  --t:#f0f0f0; --t2:#ccc; --t3:#888; --t4:#555;
  --red:#e83a3a; --green:#3ae87a; --blue:#3a8be8;
  --orange:#e8923a; --yellow:#e8c03a; --teal:#3ae8c8;
  --grad: linear-gradient(135deg,#e83a3a,#e8923a);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
.hdr{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg2);border-bottom:1.5px solid var(--bd);position:sticky;top:0;z-index:100;}
.hdr-logo{width:36px;height:36px;border-radius:6px;object-fit:contain;}
.hdr-brand{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.15em;font-family:monospace;}
.hdr-name{font-size:17px;font-weight:800;}
#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;text-align:center;}
.pin-logo{width:110px;height:110px;border-radius:16px;object-fit:contain;margin-bottom:16px;box-shadow:0 8px 32px rgba(232,58,58,.3);}
.pin-brand{font-size:24px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.pin-sub{font-size:13px;color:var(--t3);font-family:monospace;margin-bottom:8px;}
.pin-welcome{font-size:19px;font-weight:700;color:var(--t);margin-bottom:24px;min-height:28px;}
.pin-label{font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;font-family:monospace;margin-bottom:10px;}
.pin-inputs{display:flex;gap:10px;margin-bottom:24px;}
.pin-digit{width:52px;height:64px;background:var(--bg2);border:2px solid var(--bd2);border-radius:12px;font-size:28px;font-weight:800;text-align:center;color:var(--t);font-family:monospace;outline:none;caret-color:transparent;}
.pin-digit:focus{border-color:var(--red);}
.pin-btn{background:var(--grad);border:none;color:#fff;font-weight:800;font-size:16px;padding:16px 48px;border-radius:12px;cursor:pointer;font-family:inherit;width:100%;max-width:280px;}
.pin-error{color:var(--red);font-size:13px;margin-top:12px;font-family:monospace;min-height:20px;}
#main-content{display:none;padding:16px;}
.page-section{background:var(--bg2);border:1.5px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:14px;}
.sec-title{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.12em;font-family:monospace;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd);}
.client-hero{display:flex;align-items:center;gap:14px;}
.client-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0;}
.client-name-big{font-size:22px;font-weight:800;}
.client-type-lbl{font-size:13px;color:var(--t3);margin-top:2px;}
.lookup-item{padding:12px 0;border-bottom:1px solid var(--bd);}
.lookup-item:last-child{border-bottom:none;}
.lr-date{font-size:11px;color:var(--t4);font-family:monospace;}
.lr-weight{font-size:16px;font-weight:700;color:var(--green);}
.stat-row{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);}
.stat-row:last-child{border-bottom:none;}
.stat-date-lbl{font-size:11px;color:var(--t4);font-family:monospace;margin-bottom:2px;}
.stat-notes-txt{font-size:14px;color:var(--t2);}
.sess-card{background:var(--bg3);border:1.5px solid var(--bd2);border-radius:10px;overflow:hidden;margin-bottom:10px;}
.sess-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;}
.sess-card-body{display:none;padding:14px;border-top:1px solid var(--bd);}
.sess-card-body.open{display:block;}
.ex-row-c{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bd);}
.ex-row-c:last-child{border-bottom:none;}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.06em;}
.badge-done{background:#0a2a15;color:var(--green);border:1px solid #1a5a2a;}
.badge-planned{background:#1a1a00;color:var(--yellow);border:1px solid #3a3a00;}
.inp{width:100%;background:var(--bg3);border:1.5px solid var(--bd2);color:var(--t);border-radius:8px;padding:10px 12px;font-family:inherit;font-size:15px;outline:none;margin-top:4px;}
.inp:focus{border-color:var(--blue);}
.lbl{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;font-family:monospace;display:block;margin-bottom:4px;}
.field{margin-bottom:12px;}
.btn-main{display:block;width:100%;background:var(--grad);border:none;color:#fff;font-weight:800;font-size:15px;padding:14px;border-radius:10px;cursor:pointer;font-family:inherit;margin-top:8px;}
.actual-inp{background:var(--bg2);border:1.5px solid var(--bd2);color:var(--t);border-radius:8px;padding:8px 10px;font-family:monospace;font-size:14px;text-align:center;width:80px;outline:none;}
.actual-inp:focus{border-color:var(--blue);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1.5px solid #333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;pointer-events:none;opacity:0;transition:opacity .2s;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style>
</head>

    <div class="sec-title">&#128269; Exercise Lookup</div>
    <div class="field">
      <input class="inp" id="ex-search" type="search" placeholder="Search exercise name..." oninput="doExLookup()">
    </div>
    <div id="ex-results" style="color:var(--t4);font-size:13px;padding:4px 0;">Type an exercise to see your history</div>
  </div>

  <div class="page-section">
    <div class="sec-title">&#128200; Body Stats &amp; Notes</div>
    <div class="field"><span class="lbl">Date</span><input class="inp" id="new-stat-date" type="date"></div>
    <div class="field"><span class="lbl">Notes / Measurements</span>
      <textarea class="inp" id="new-stat-notes" rows="2" placeholder="e.g. Weight: 72kg, feeling stronger..."></textarea></div>
    <button class="btn-main" onclick="addStatEntry()">+ Add Entry</button>
    <div id="stats-list" style="margin-top:14px;"></div>
  </div>
</div>

<div id="toast"></div>

<script>
var SCRIPT_URL = '';
var clientId   = '';
var clientData = null;
var allSessions = [];

window.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  clientId = params.get('id') || '';
  if (!clientId) {
    document.getElementById('pin-error').textContent = 'Invalid link — no client ID.';
    return;
  }

  // Welcome message from URL name param
  var clientName = decodeURIComponent(params.get('name') || '');
  var welcomeEl = document.getElementById('welcome-msg');
  if (clientName && welcomeEl) {
    welcomeEl.textContent = 'Welcome, ' + clientName + '!';
    document.title = 'Impact Coaching — ' + clientName;
  }

  // Wire PIN digits
  for (var i = 0; i < 5; i++) {
    (function(idx) {
      var el = document.getElementById('p' + idx);
      el.addEventListener('input', function() {
        this.value = this.value.replace(/\D/g, '').slice(-1);
        if (this.value && idx < 4) document.getElementById('p' + (idx+1)).focus();
        if (idx === 4 && this.value) submitPin();
      });
      el.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !this.value && idx > 0)
          document.getElementById('p' + (idx-1)).focus();
      });
    })(i);
  }
  document.getElementById('p0').focus();

  // Load script URL — first try &su= param (works cross-device), then localStorage
  var suParam = params.get('su');
  if (suParam) {
    SCRIPT_URL = decodeURIComponent(suParam);
  } else {
    try {
      var raw2 = localStorage.getItem('impact-coaching-v2');
      if (raw2) { var db2 = JSON.parse(raw2); SCRIPT_URL = (db2.settings && db2.settings.scriptUrl) || ''; }
    } catch(e2) {}
  }
});

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}

function initials(name) {
  return (name||'').split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2);
}

function submitPin() {
  var pin = '';
  for (var i = 0; i < 5; i++) pin += document.getElementById('p'+i).value;
  if (pin.length < 5) { document.getElementById('pin-error').textContent = 'Please enter all 5 digits.'; return; }
  document.getElementById('pin-error').textContent = '';
  if (SCRIPT_URL) verifyPinFromDrive(pin);
  else verifyPinLocal(pin);
}

function verifyPinLocal(pin) {
  try {
    var raw = localStorage.getItem('impact-coaching-v2');
    if (!raw) { showPinError('Could not load data.'); return; }
    var db = JSON.parse(raw);
    var client = (db.clients||[]).find(function(c){return c.id===clientId;});
    if (!client) { showPinError('Client not found.'); return; }
    if (String(client.pin) !== String(pin)) { showPinError('Incorrect PIN. Try again.'); return; }
    loadClientData(db, client);
  } catch(e) { showPinError('Error loading data.'); }
}

function verifyPinFromDrive(pin) {
  document.getElementById('pin-error').textContent = 'Checking...';
  fetch(SCRIPT_URL)
    .then(function(r){return r.json();})
    .then(function(db){
      var client = (db.clients||[]).find(function(c){return c.id===clientId;});
      if (!client) { showPinError('Client not found.'); return; }
      if (String(client.pin) !== String(pin)) { showPinError('Incorrect PIN. Try again.'); return; }
      loadClientData(db, client);
    })
    .catch(function(){ showPinError('Could not connect. Check connection.'); });
}

function showPinError(msg) {
  document.getElementById('pin-error').textContent = msg;
  var row = document.getElementById('pin-inputs-row');
  row.style.animation = 'shake .3s';
  setTimeout(function(){ row.style.animation=''; }, 300);
  for (var i = 0; i < 5; i++) document.getElementById('p'+i).value = '';
  document.getElementById('p0').focus();
}

function loadClientData(db, client) {
  clientData = client;
  allSessions = (db.sessions||[]).filter(function(s){
    return s.clientId===clientId || s.clientId2===clientId;
  }).sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});

  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('main-hdr').style.display = 'flex';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('hdr-client-name').textContent = client.name;

  var av = document.getElementById('client-av');
  av.textContent = initials(client.name);
  av.style.background = client.color || '#e83a3a';
  document.getElementById('client-name-el').textContent = client.name;
  document.getElementById('client-type-el').textContent = client.ptType || 'Impact Coaching Client';
  document.getElementById('new-stat-date').value = new Date().toISOString().slice(0,10);

  renderAssignedSessions();
  renderStatsLog();
  renderClientTDEE();
}

function renderAssignedSessions() {
  var el = document.getElementById('assigned-list');
  var assigned = allSessions.filter(function(s){return s.assignedToClient;});
  if (!assigned.length) {
    el.innerHTML = '<div style="color:var(--t4);font-size:13px;padding:8px 0;">No sessions assigned yet</div>';
    return;
  }
  var html = '';
  assigned.forEach(function(s) {
    var isDone = s.status === 'completed';
    var badge  = isDone ? '<span class="badge badge-done">Done</span>' : '<span class="badge badge-planned">Planned</span>';
    html += '<div class="sess-card">';
    html += '<div class="sess-card-hdr" data-id="'+s.id+'" onclick="toggleSessBody(this.dataset.id)">';
    html += '<div><div style="font-size:15px;font-weight:700;">'+(s.name||'Session')+'</div>';
    html += '<div style="font-size:11px;color:var(--t3);font-family:monospace;margin-top:2px;">'+s.date+'</div></div>';
    html += '<div style="display:flex;align-items:center;gap:8px;">'+badge+'<span style="color:var(--t4);">&#8250;</span></div></div>';
    html += '<div class="sess-card-body" id="sb-'+s.id+'">';
    (s.rows||[]).forEach(function(r) {
      html += '<div class="ex-row-c">';
      html += '<div><div style="font-size:14px;font-weight:600;">'+r.exerciseName+'</div>';
      html += '<div style="font-size:12px;color:var(--t3);">'+(r.scheme||'')+(r.target?' · Target: '+r.target+'kg':'')+'</div></div>';
      if (!isDone) {
        html += '<input class="actual-inp" id="act-'+r.id+'" type="number" placeholder="kg" value="'+(r.actual||'')+'" min="0" step="0.5">';
      } else {
        html += '<div style="font-size:14px;font-weight:700;color:var(--green);">'+(r.actual||'—')+(r.actual?'kg':'')+'</div>';
      }
      html += '</div>';
    });
    if (s.notes) html += '<div style="margin-top:10px;padding:10px;background:var(--bg2);border-radius:8px;font-size:12px;color:var(--t3);">Notes: '+s.notes+'</div>';
    if (!isDone) {
      html += '<div style="margin-top:10px;"><span class="lbl">Feedback for your PT</span>';
      html += '<textarea class="inp" id="cn-'+s.id+'" rows="2" placeholder="How did it go?..."></textarea></div>';
      html += '<button class="btn-main" data-sid="'+s.id+'" onclick="completeSession(this.dataset.sid)">&#10003; Mark Complete</button>';
    }
    html += '</div></div>';
  });
  el.innerHTML = html;
}

function toggleSessBody(id) {
  var el = document.getElementById('sb-'+id);
  if (el) el.classList.toggle('open');
}

function completeSession(sessId) {
  var s = allSessions.find(function(x){return x.id===sessId;});
  if (!s) return;
  (s.rows||[]).forEach(function(r){
    var inp = document.getElementById('act-'+r.id);
    if (inp) r.actual = inp.value.trim();
  });
  var cnEl = document.getElementById('cn-'+sessId);
  s.clientNotes = cnEl ? cnEl.value.trim() : '';
  s.status = 'completed';
  s.completedAt = new Date().toISOString();
  if (SCRIPT_URL) {
    pushSessionUpdate(s);
  } else {
    try {
      var raw = localStorage.getItem('impact-coaching-v2');
      if (raw) {
        var db = JSON.parse(raw);
        var idx = db.sessions.findIndex(function(x){return x.id===sessId;});
        if (idx > -1) db.sessions[idx] = s;
        localStorage.setItem('impact-coaching-v2', JSON.stringify(db));
      }
    } catch(e) {}
  }
  renderAssignedSessions();
  toast('Session complete! Well done! 💪');
}

function pushSessionUpdate(session) {
  fetch(SCRIPT_URL)
    .then(function(r){return r.json();})
    .then(function(db){
      var idx = db.sessions.findIndex(function(x){return x.id===session.id;});
      if (idx > -1) db.sessions[idx] = session;
      return fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(db), headers:{'Content-Type':'text/plain'} });
    })
    .then(function(){ toast('Synced to your PT!'); })
    .catch(function(){ toast('Saved — syncing soon'); });
}

function doExLookup() {
  var q = (document.getElementById('ex-search').value||'').trim().toLowerCase();
  var el = document.getElementById('ex-results');
  if (!q) { el.innerHTML = '<div style="color:var(--t4);font-size:13px;">Type an exercise to see your history</div>'; return; }
  var results = [];
  allSessions.forEach(function(s){
    if (s.status !== 'completed') return;
    (s.rows||[]).forEach(function(r){
      if (!r.exerciseName) return;
      if (r.exerciseName.toLowerCase().indexOf(q) === -1) return;
      if (r.actual || r.target) results.push({ date:s.date, exercise:r.exerciseName, scheme:r.scheme||'', target:r.target||'', actual:r.actual||'' });
    });
  });
  results.sort(function(a,b){return b.date.localeCompare(a.date);});
  if (!results.length) { el.innerHTML = '<div style="color:var(--t4);font-size:13px;padding:8px 0;">No history for "'+q+'"</div>'; return; }
  var html = '';
  results.forEach(function(r){
    html += '<div class="lookup-item"><div style="display:flex;align-items:center;justify-content:space-between;">';
    html += '<div><div style="font-size:14px;font-weight:600;">'+r.exercise+'</div>';
    html += '<div class="lr-date">'+r.date+(r.scheme?' · '+r.scheme:'')+'</div></div>';
    html += '<div style="text-align:right;">';
    if (r.actual) html += '<div class="lr-weight">'+r.actual+'kg</div>';
    if (r.target) html += '<div style="font-size:11px;color:var(--t3);">Target: '+r.target+'kg</div>';
    html += '</div></div></div>';
  });
  el.innerHTML = html;
}

function renderStatsLog() {
  var el = document.getElementById('stats-list');
  var log = (clientData && clientData.statsLog) || [];
  if (!log.length) { el.innerHTML = '<div style="color:var(--t4);font-size:13px;padding:8px 0;">No entries yet</div>'; return; }
  var sorted = log.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  var html = '';
  sorted.forEach(function(e){
    var srcTag = e.source === 'pt' ? ' <span style="font-size:9px;font-family:monospace;background:#1a0800;color:#e8923a;border:1px solid #e8923a33;padding:1px 5px;border-radius:3px;">PT</span>' : '';
    html += '<div class="stat-row"><div><div class="stat-date-lbl">'+e.date+srcTag+'</div><div class="stat-notes-txt">'+e.notes+'</div></div></div>';
  });
  el.innerHTML = html;
}

function addStatEntry() {
  var date  = document.getElementById('new-stat-date').value;
  var notes = document.getElementById('new-stat-notes').value.trim();
  if (!date || !notes) { toast('Enter a date and notes'); return; }
  if (!clientData.statsLog) clientData.statsLog = [];
  clientData.statsLog.push({ id: Date.now().toString(36), date:date, notes:notes, source:'client' });
  clientData.updatedAt = new Date().toISOString();
  document.getElementById('new-stat-notes').value = '';
  if (SCRIPT_URL) {
    fetch(SCRIPT_URL).then(function(r){return r.json();}).then(function(db){
      var ci = db.clients.findIndex(function(c){return c.id===clientId;});
      if (ci > -1) db.clients[ci] = clientData;
      return fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify(db), headers:{'Content-Type':'text/plain'} });
    }).then(function(){ toast('Entry saved!'); }).catch(function(){ toast('Saved locally'); });
  } else {
    try {
      var raw = localStorage.getItem('impact-coaching-v2');
      if (raw) {
        var db = JSON.parse(raw);
        var ci = db.clients.findIndex(function(c){return c.id===clientId;});
        if (ci > -1) db.clients[ci] = clientData;
        localStorage.setItem('impact-coaching-v2', JSON.stringify(db));
      }
    } catch(e) {}
    toast('Entry added!');
  }
  renderStatsLog();
}
function renderClientTDEE() {
  var section = document.getElementById('tdee-section');
  var el = document.getElementById('tdee-client-content');
  if (!section || !el || !clientData) return;
  var hist = clientData.tdeeHistory || [];
  if (!hist.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  var t = hist[0];
  var goalLabels = { maintain:'Maintain Weight', lose_half:'Lose 0.5kg/wk', lose_1:'Lose 1kg/wk', gain_half:'Gain 0.5kg/wk' };
  var html = '<div style="background:var(--bg3);border-radius:10px;padding:14px;">';
  html += '<div style="display:flex;justify-content:space-between;margin-bottom:10px;">';
  html += '<div style="font-size:11px;color:var(--t3);font-family:monospace;text-transform:uppercase;">Latest Result</div>';
  html += '<div style="font-size:10px;color:var(--t4);font-family:monospace;">'+t.date+'</div></div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px;">';
  html += '<div style="text-align:center;"><div style="font-size:20px;font-weight:800;color:var(--red);">'+(t.tdee||'--')+'</div><div style="font-size:9px;color:var(--t3);font-family:monospace;">TDEE</div></div>';
  html += '<div style="text-align:center;"><div style="font-size:20px;font-weight:800;color:var(--blue);">'+(t.protein||'--')+'g</div><div style="font-size:9px;color:var(--t3);font-family:monospace;">Protein</div></div>';
  html += '<div style="text-align:center;"><div style="font-size:20px;font-weight:800;color:var(--orange);">'+(t.carbs||'--')+'g</div><div style="font-size:9px;color:var(--t3);font-family:monospace;">Carbs</div></div>';
  html += '<div style="text-align:center;"><div style="font-size:20px;font-weight:800;color:var(--yellow);">'+(t.fat||'--')+'g</div><div style="font-size:9px;color:var(--t3);font-family:monospace;">Fat</div></div>';
  html += '</div>';
  if (t.goal || t.targetCals) {
    html += '<div style="font-size:12px;color:var(--t3);">';
    if (t.goal) html += 'Goal: ' + (goalLabels[t.goal]||t.goal);
    if (t.targetCals) html += ' &middot; <span style="color:var(--t2);">Target: '+t.targetCals+' kcal/day</span>';
    html += '</div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

</script>
</body>
</html>
